{{define "layout"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://unpkg.com/alpinejs@3.13.7/dist/cdn.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
  <style>:root { --accent: {{.UI.AccentColor}}; }</style>
  <!-- Early-paint i18n: read stored preference or auto-detect from browser,
       apply cached catalog synchronously so translated text renders on first
       paint. Non-cached languages fetch async via app.js and re-apply. -->
  <script>
  (function () {
    var SUP = ['en','be','ru','uk'];
    var TTL = 365*24*60*60*1000;
    var lang = 'en';
    try {
      var stored = localStorage.getItem('taler_lang');
      var setAt = parseInt(localStorage.getItem('taler_lang_set_at') || '0', 10);
      if (stored && SUP.indexOf(stored) >= 0 && Date.now() - setAt <= TTL) {
        lang = stored;
      } else {
        var prefs = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language || 'en'];
        for (var i = 0; i < prefs.length; i++) {
          var p = String(prefs[i] || '').toLowerCase().split('-')[0];
          if (SUP.indexOf(p) >= 0) { lang = p; break; }
        }
      }
    } catch (_) {}
    document.documentElement.setAttribute('lang', lang);
    if (lang === 'en') return;
    var cat = null;
    try { cat = JSON.parse(localStorage.getItem('taler_lang_cache_' + lang) || 'null'); } catch (_) {}
    if (!cat) return; // will be fetched + applied in app.js
    document.addEventListener('DOMContentLoaded', function () {
      function tr(k) { return (cat && Object.prototype.hasOwnProperty.call(cat, k) && cat[k]) || k; }
      document.querySelectorAll('[data-t]').forEach(function (el) { var v = tr(el.getAttribute('data-t')); if (el.textContent !== v) el.textContent = v; });
      document.querySelectorAll('[data-t-placeholder]').forEach(function (el) { el.setAttribute('placeholder', tr(el.getAttribute('data-t-placeholder'))); });
      document.querySelectorAll('[data-t-title]').forEach(function (el) { el.setAttribute('title', tr(el.getAttribute('data-t-title'))); });
      document.querySelectorAll('[data-t-aria-label]').forEach(function (el) { el.setAttribute('aria-label', tr(el.getAttribute('data-t-aria-label'))); });
    });
  })();
  </script>
</head>
<body class="theme-dark">
  <div class="aurora" aria-hidden="true"></div>

  <header class="site-header">
    <div class="site-header-top">
      <a href="/" class="brand">
        <img class="brand-mark" src="/static/img/taler_circular.png" alt="{{.UI.SiteName}}" width="44" height="44">
        <span class="brand-name">
          <span class="brand-line">Taler</span>
          <span class="brand-line">Explorer</span>
        </span>
      </a>

      <div class="lang-switch"
           x-data="{ open: false, cur: (window.TalerI18n && window.TalerI18n.currentLang()) || (document.documentElement.getAttribute('lang') || 'en') }"
           @click.outside="open = false"
           @keydown.escape.window="open = false">
        <button type="button" class="lang-current" @click="open = !open" :aria-expanded="open" aria-haspopup="listbox" :title="'Language: ' + cur.toUpperCase()">
          <span x-text="cur.toUpperCase()">EN</span>
          <span class="lang-caret" aria-hidden="true">▾</span>
        </button>
        <ul class="lang-menu" x-show="open" role="listbox" x-cloak>
          <template x-for="c in ['en','be','ru','uk']" :key="c">
            <li role="option" :aria-selected="cur === c">
              <button type="button" :class="{ active: cur === c }"
                      @click="cur = c; open = false; window.TalerI18n && window.TalerI18n.setLang(c)">
                <span x-text="c.toUpperCase()"></span>
                <span class="lang-native" x-text="({en:'English',be:'Беларуская',ru:'Русский',uk:'Українська'})[c]"></span>
              </button>
            </li>
          </template>
        </ul>
      </div>

      <nav class="nav">
        <a href="/" class="{{if or (eq .Active "blocks") (eq .Active "block")}}active{{end}}">
          <svg class="nav-icon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="2" width="5.5" height="5.5" rx="1"/>
            <rect x="8.5" y="2" width="5.5" height="5.5" rx="1"/>
            <rect x="2" y="8.5" width="5.5" height="5.5" rx="1"/>
            <rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1"/>
          </svg>
          <span data-t="Blocks">Blocks</span>
        </a>
        <a href="/txs" class="{{if or (eq .Active "txs") (eq .Active "tx") (eq .Active "address")}}active{{end}}">
          <svg class="nav-icon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 5.5h11l-3-3"/>
            <path d="M14 10.5H3l3 3"/>
          </svg>
          <span data-t="Transactions">Transactions</span>
        </a>
        <a href="/network" class="{{if eq .Active "network"}}active{{end}}">
          <svg class="nav-icon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="8" cy="8" r="6.5"/>
            <path d="M1.5 8h13M8 1.5c2.4 2.4 2.4 10.6 0 13M8 1.5c-2.4 2.4-2.4 10.6 0 13" stroke-linecap="round"/>
          </svg>
          <span data-t="Network">Network</span>
        </a>
      </nav>
      <form class="search-form" role="search" action="/search" method="get">
        <input type="search" name="q"
               placeholder="Block #, tx hash, or address"
               data-t-placeholder="Block #, tx hash, or address"
               autocomplete="off" spellcheck="false"
               aria-label="Search blocks, transactions, and addresses"
               data-t-aria-label="Search blocks, transactions, and addresses">
        <button type="submit" aria-label="Search" data-t-aria-label="Search">⌕</button>
      </form>
    </div>

    <div id="header-stats"
         class="header-stats"
         hx-get="/_partial/header-stats"
         hx-trigger="every 10s"
         hx-swap="innerHTML">
      {{template "header_stats" .HeaderStats}}
    </div>
  </header>

  <main class="container">
    {{template "body" .Body}}
  </main>

  <footer class="site-footer">
    <span>{{.UI.SiteName}}</span>
    <span class="sep">·</span>
    <span>{{.UI.CoinSymbol}} <span data-t="chain">chain</span></span>
    <span class="sep">·</span>
    <a class="version-tag-footer" href="https://github.com/abkvme/taler-explorer/releases" target="_blank" rel="noopener" title="View release notes" data-t-title="View release notes">{{buildVersion}}</a>
    <span class="sep">·</span>
    <a href="https://taler.tech" target="_blank" rel="noopener">taler.tech</a>
    <span class="sep">·</span>
    <a href="https://github.com/abkvme/taler" target="_blank" rel="noopener" class="gh-link" title="Taler on GitHub">
      <svg class="gh-icon" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
      Taler
    </a>
    <span class="sep">·</span>
    <a href="https://github.com/abkvme/taler-explorer" target="_blank" rel="noopener" class="gh-link" title="Taler Explorer on GitHub">
      <svg class="gh-icon" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
      Explorer
    </a>
  </footer>

  <!-- Invisible fetchers for tile-embedded sparklines. They live in the
       layout so header_stats swaps don't cancel their polling. -->
  <div id="sparkline-fetcher" style="display:none"
       hx-get="/_partial/hashrate-series"
       hx-trigger="load, every 60s"
       hx-swap="none"
       hx-on::after-request="window.renderSparkline && window.renderSparkline(event.detail.xhr.responseText)">
  </div>
  <div id="price-sparkline-fetcher" style="display:none"
       hx-get="/_partial/price-series"
       hx-trigger="load, every 120s"
       hx-swap="none"
       hx-on::after-request="window.renderPriceSparkline && window.renderPriceSparkline(event.detail.xhr.responseText)">
  </div>

  <script src="/static/js/app.js" defer></script>
</body>
</html>
{{end}}
