{{define "body"}}
<section class="hero">
  <h1 data-t="Latest blocks">Latest blocks</h1>
  <p class="subtitle" data-t="Newest blocks at the top. Click any row for block details.">Newest blocks at the top. Click any row for block details.</p>
</section>

<section class="card">
  <div class="table-wrap">
    <table class="data-table block-table">
      <thead>
        <tr>
          <th class="num" data-t="Height">Height</th>
          <th data-t="Time">Time</th>
          <th data-t="Type">Type</th>
          <th class="num" data-t="Txs">Txs</th>
          <th class="num" data-t="Size">Size</th>
          <th class="num" data-t="Difficulty">Difficulty</th>
          <th data-t="Hash">Hash</th>
        </tr>
      </thead>
      <tbody id="blocks-body"
             hx-get="/_partial/latest-blocks"
             hx-trigger="every 10s"
             hx-swap="innerHTML">
        {{range .Blocks}}
        {{template "block_row" .}}
        {{end}}
      </tbody>
    </table>
  </div>
</section>
{{end}}
