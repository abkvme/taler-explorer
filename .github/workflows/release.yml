name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write      # create GitHub Releases
  packages: write      # push to ghcr.io

jobs:
  release:
    name: Build, publish container, create release
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/abkvme/taler-explorer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go build
        run: go build -o /dev/null ./...

      - name: go test
        run: go test ./...

      - name: Set up QEMU (for arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Container image

            Published to **GitHub Container Registry**:

            ```sh
            docker pull ghcr.io/abkvme/taler-explorer:${{ github.ref_name }}
            docker pull ghcr.io/abkvme/taler-explorer:latest
            ```

            Multi-arch: `linux/amd64`, `linux/arm64`.

            See the [README](https://github.com/abkvme/taler-explorer#run-via-docker) for `docker compose` usage.
